services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: "4000"
      CORS_ORIGIN: "*"
      SHARED_INVITE_CODE: home
      DATABASE_URL: postgres://phone_levelg:phone_levelg@postgres:5432/phone_levelg?sslmode=disable
      REDIS_ADDR: redis:6379
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  livekit:
    image: docker.io/livekit/livekit-server:latest
    command: ["--config", "/etc/livekit/livekit.yaml"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50100-50120:50100-50120/udp"
    volumes:
      - ./deploy/local/livekit.yaml:/etc/livekit/livekit.yaml:ro

  postgres:
    image: docker.io/library/postgres:18-alpine
    environment:
      POSTGRES_DB: phone_levelg
      POSTGRES_USER: phone_levelg
      POSTGRES_PASSWORD: phone_levelg
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phone_levelg -d phone_levelg"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: docker.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis7-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres18-data:
  redis7-data:
