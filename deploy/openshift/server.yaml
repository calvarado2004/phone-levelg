apiVersion: v1
kind: Namespace
metadata:
  name: phone-levelg
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
spec:
  source:
    type: Git
    git:
      uri: https://github.com/calvarado2004/phone-levelg.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: apps/server/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: phone-levelg-server:latest
  triggers:
    - type: ConfigChange
    - type: GitHub
      github:
        secretReference:
          name: phone-levelg-github-webhook
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phone-levelg-server
  template:
    metadata:
      labels:
        app: phone-levelg-server
    spec:
      containers:
        - name: server
          image: image-registry.openshift-image-registry.svc:5000/phone-levelg/phone-levelg-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: CORS_ORIGIN
              value: "*"
          envFrom:
            - secretRef:
                name: phone-levelg-server
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
spec:
  selector:
    app: phone-levelg-server
  ports:
    - name: http
      port: 4000
      targetPort: 4000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
spec:
  to:
    kind: Service
    name: phone-levelg-server
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
