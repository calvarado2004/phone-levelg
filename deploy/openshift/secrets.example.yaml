apiVersion: v1
kind: Secret
metadata:
  name: phone-levelg-github-webhook
  namespace: phone-levelg
  annotations:
    phone-levelg.io/example-only: "true"
type: Opaque
stringData:
  WebHookSecretKey: "replace-with-private-github-webhook-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: phone-levelg-server
  namespace: phone-levelg
  annotations:
    phone-levelg.io/example-only: "true"
type: Opaque
stringData:
  SHARED_INVITE_CODE: "replace-with-private-invite-code"
  LIVEKIT_API_KEY: "replace-with-livekit-api-key"
  LIVEKIT_API_SECRET: "replace-with-livekit-api-secret"
  DATABASE_URL: "postgres://replace-user:replace-password@postgres:5432/phone_levelg?sslmode=disable"
  REDIS_ADDR: "redis:6379"
  APNS_TEAM_ID: "replace-with-apple-team-id"
  APNS_KEY_ID: "replace-with-apple-key-id"
  APNS_BUNDLE_ID: "io.levelg.phone"
  APNS_PRIVATE_KEY: "replace-with-apns-private-key"
  APNS_ENDPOINT: "https://api.push.apple.com"
  FCM_PROJECT_ID: "replace-with-firebase-project-id"
  FCM_ACCESS_TOKEN: ""
  FCM_SERVICE_ACCOUNT_JSON: "replace-with-firebase-service-account-json"
  FCM_ENDPOINT: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres
  namespace: phone-levelg
  annotations:
    phone-levelg.io/example-only: "true"
type: Opaque
stringData:
  POSTGRES_DB: "phone_levelg"
  POSTGRES_USER: "replace-with-postgres-user"
  POSTGRES_PASSWORD: "replace-with-postgres-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: phone-levelg-livekit
  namespace: phone-levelg
  annotations:
    phone-levelg.io/example-only: "true"
type: Opaque
stringData:
  LIVEKIT_KEYS: "replace-with-livekit-api-key: replace-with-livekit-api-secret"
