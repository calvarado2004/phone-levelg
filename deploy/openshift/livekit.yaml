apiVersion: v1
kind: Secret
metadata:
  name: phone-levelg-livekit
  namespace: phone-levelg
type: Opaque
stringData:
  LIVEKIT_KEYS: "devkey: secret"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: phone-levelg-livekit
  namespace: phone-levelg
data:
  livekit.yaml: |
    port: 7880
    bind_addresses:
      - ""
    keys:
      devkey: secret
    rtc:
      node_ip: 192.168.1.88
      tcp_port: 7881
      port_range_start: 50100
      port_range_end: 50120
      use_external_ip: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phone-levelg-livekit
  namespace: phone-levelg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phone-levelg-livekit
  template:
    metadata:
      labels:
        app: phone-levelg-livekit
    spec:
      containers:
        - name: livekit
          image: docker.io/livekit/livekit-server:latest
          args: ["--config", "/etc/livekit/livekit.yaml"]
          ports:
            - name: signal
              containerPort: 7880
            - name: rtc-tcp
              containerPort: 7881
            - name: rtc-udp
              containerPort: 50100
              protocol: UDP
          env:
            - name: LIVEKIT_KEYS
              valueFrom:
                secretKeyRef:
                  name: phone-levelg-livekit
                  key: LIVEKIT_KEYS
          volumeMounts:
            - name: livekit-config
              mountPath: /etc/livekit
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 7880
            initialDelaySeconds: 15
      volumes:
        - name: livekit-config
          configMap:
            name: phone-levelg-livekit
---
apiVersion: v1
kind: Service
metadata:
  name: phone-levelg-livekit
  namespace: phone-levelg
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: phone-levelg-livekit
  ports:
    - name: signal
      port: 7880
      targetPort: 7880
    - name: rtc-tcp
      port: 7881
      targetPort: 7881
